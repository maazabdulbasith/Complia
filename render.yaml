services:
  # 1. Django Backend (Web Service)
  - type: web
    name: complia-backend
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn complia_backend.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        fromService:
          type: web
          name: complia-backend
          property: host
      - key: CORS_ALLOWED_ORIGINS
        fromService:
          type: static
          name: complia-frontend
          property: url
      - key: DATABASE_URL
        fromDatabase:
          name: complia-postgres
          property: connectionString
      - key: SENTRY_DSN
        sync: false
      - key: SECURE_SSL_REDIRECT
        value: true
      - key: SECURE_HSTS_SECONDS
        value: 31536000

  # 2. React Frontend (Static Site)
  - type: static
    name: complia-frontend
    runtime: node
    buildCommand: cd complia_frontend && npm ci && npm run build
    publishDir: complia_frontend/build/client
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: complia-backend
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: complia-postgres
    plan: free
