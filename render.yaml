services:
  # 1. Django Backend (Web Service)
  - type: web
    name: complia-backend
    runtime: python
    healthCheckPath: /api/v1/health/
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn complia_backend.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        fromService:
          type: web
          name: complia-backend
          property: host
      - key: CORS_ALLOWED_ORIGINS
        fromService:
          type: static
          name: complia-frontend
          property: url
      - key: CSRF_TRUSTED_ORIGINS
        fromService:
          type: static
          name: complia-frontend
          property: url
      - key: DATABASE_URL
        fromDatabase:
          name: complia-postgres
          property: connectionString
      - key: DB_SSL_REQUIRE
        value: true
      - key: SITE_ID
        value: 1
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SUPERADMIN_EMAILS
        sync: false
      - key: PARSER_BETA_EMAILS
        sync: false
      - key: PARSER_PRIVATE_BETA_ENABLED
        value: false
      - key: PARSER_REVIEW_THRESHOLD
        value: 0.75
      - key: PARSER_EPHEMERAL_TTL_HOURS
        value: 1
      - key: PARSER_MAX_UPLOAD_MB
        value: 10
      - key: ASSISTED_OFFER_ENABLED
        value: true
      - key: ASSISTED_OFFER_DEFAULT_KEY
        value: assisted_response_pack_v1
      - key: ASSISTED_OFFER_TARGET_SEVERITY
        value: high
      - key: PUBLIC_SITE_URL
        fromService:
          type: static
          name: complia-frontend
          property: url
      - key: SENTRY_DSN
        sync: false
      - key: SECURE_SSL_REDIRECT
        value: true
      - key: SECURE_HSTS_SECONDS
        value: 31536000

  # 1b. Parser TTL Cleanup (Cron)
  - type: cron
    name: complia-parser-cleanup
    runtime: python
    schedule: "*/30 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py cleanup_expired_parser_jobs
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: complia-postgres
          property: connectionString
      - key: DB_SSL_REQUIRE
        value: true

  # 1c. Parser Benchmark Refresh (Cron)
  - type: cron
    name: complia-parser-benchmark
    runtime: python
    schedule: "0 2 * * 1"
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py run_parser_benchmark
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: complia-postgres
          property: connectionString
      - key: DB_SSL_REQUIRE
        value: true

  # 2. React Frontend (Static Site)
  - type: static
    name: complia-frontend
    runtime: node
    buildCommand: cd complia_frontend && npm ci && npm run build
    publishDir: complia_frontend/build/client
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: complia-backend
          property: url
      - key: VITE_SITE_URL
        fromService:
          type: static
          name: complia-frontend
          property: url
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
      - key: VITE_ENABLE_ANALYTICS
        value: true
    routes:
      - type: redirect
        source: /sitemap.xml
        destination: https://complia-mzrq.onrender.com/sitemap.xml
      - type: redirect
        source: /robots.txt
        destination: https://complia-mzrq.onrender.com/robots.txt
      - type: redirect
        source: /api/*
        destination: https://complia-mzrq.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: complia-postgres
    plan: free
