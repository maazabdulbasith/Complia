name: Complia CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install backend dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Django Tests
      env:
        SECRET_KEY: 'ci-pipeline-insecure-key-do-not-use-in-prod'
        DEBUG: 'True'
        ALLOWED_HOSTS: 'localhost,127.0.0.1'
        # No DATABASE_URL set, will fall back to SQLite for tests
      run: |
        cd complia_backend
        # Note: In a real CI, we might run flake8 here first
        python ../manage.py test complia_backend.notices.tests

  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./complia_frontend
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './complia_frontend/package.json'
        
    - name: Install frontend dependencies
      run: |
        npm ci
        
    - name: Type check
      run: |
        npm run typecheck
